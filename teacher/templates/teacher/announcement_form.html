{% extends 'base.html' %}
{% load static %}
{% block title %}{{ action }} Announcement — Teacher Portal{% endblock %}
{% block extra_head %}
<style>
.portal-page{min-height:100vh;background:linear-gradient(135deg,#0a0a0f 0%,#112D32 100%);padding:40px 5%;}
.portal-back{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.9rem;display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;transition:color 0.2s;}
.portal-back:hover{color:#ffd700;}
.form-card{max-width:700px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px;}
.form-card h2{color:#ffd700;font-size:1.5rem;font-weight:800;margin-bottom:28px;display:flex;align-items:center;gap:10px;}
.form-group{margin-bottom:22px;}
.form-group label{display:block;color:rgba(255,255,255,0.7);font-size:0.88rem;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px;}
.form-control{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:white;padding:12px 16px;font-size:0.95rem;outline:none;transition:all 0.3s;}
.form-control:focus{border-color:rgba(255,215,0,0.5);background:rgba(255,255,255,0.08);box-shadow:0 0 0 3px rgba(255,215,0,0.1);}
.form-control option{background:#112D32;}
textarea.form-control{resize:vertical;min-height:150px;}
.checkbox-label{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:0.95rem;cursor:pointer;}
.checkbox-label input{width:18px;height:18px;accent-color:#ffd700;}
.submit-btn{background:linear-gradient(135deg,#8b00ff,#ffd700);color:#fff;border:none;padding:13px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,0,255,0.4);}
</style>
{% endblock %}
{% block content %}
<div class="portal-page">
    <a href="{% url 'teacher:manage_announcements' %}" class="portal-back"><i class="fas fa-arrow-left"></i> Back to Announcements</a>
    <div class="form-card">
        <h2><i class="fas fa-bullhorn"></i> {{ action }} Announcement</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" class="form-control" value="{{ announcement.title|default:'' }}" placeholder="e.g. New Workbook Available!" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-control">
                    <option value="news" {% if announcement.category == 'news' %}selected{% endif %}>News</option>
                    <option value="info" {% if announcement.category == 'info' %}selected{% endif %}>Info</option>
                    <option value="event" {% if announcement.category == 'event' %}selected{% endif %}>Event</option>
                </select>
            </div>
            <div class="form-group">
                <label for="body">Body</label>
                <textarea id="body" name="body" class="form-control" placeholder="Full announcement text...">{{ announcement.body|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_published" {% if not announcement or announcement.is_published %}checked{% endif %}>
                    Publish immediately
                </label>
            </div>
            <button type="submit" class="submit-btn"><i class="fas fa-save"></i> {{ action }} Announcement</button>
        </form>
    </div>
</div>
{% endblock %}
